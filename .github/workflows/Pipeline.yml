name: CICD Pipeline

on:
  workflow_dispatch:

jobs:
  code:
    name: Build/Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build step
        run: echo "Building the code"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: code
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run tests
        run: echo "Running tests"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Deploy the app
        run: echo "Docker compose deploying the app"
