   inputs:
     environment:
      description: This is environment value for your use
      default: 'dev'
      required: true
      type: choice
      options:
        - dev
        - prod
        - staging

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        run: echo "Cloning the code from GitHub"

  test:
    needs: code
    runs-on: ubuntu-latest
    steps:
      - name: Test continue
        run: echo "Testing"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the app
        run: echo "Run the code"
