name: metrix
on:
 push:
  branches: [main]

jobs:
  stategy:
  fail-fast: false
  matrix:
   python-version: ["3.10","3.11","3.12"]

  steps:
    - name: checkout code
      uses: actions/checkout@v4

    - name: python version ${{matrix.python-version}}
      uses: actions/setup-python@v4
      with: 
        python-version: ${{matrix.python-version}}     
  

  
   
